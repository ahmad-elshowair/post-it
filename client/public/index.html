<!doctype html>
<html lang="en">
  <head>
    <script>
      // Suppress harmless ResizeObserver warning triggered by MUI/React layout changes.
      // Doing this in capture phase in index.html ensures it runs before React Dev Overlay.
      window.addEventListener('error', function(e) {
        if (e.message === 'ResizeObserver loop limit exceeded' || 
            e.message === 'ResizeObserver loop completed with undelivered notifications.') {
          e.stopImmediatePropagation();
        }
      }, { capture: true });
    </script>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Post It - Share your moments" />
    <link href="./style.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"
    />
    <link rel="icon" href="./api/images/chat-it-0.png" />

    <title>Post It</title>
  </head>
  <body>
    <main id="root"></main>
  </body>
</html>
